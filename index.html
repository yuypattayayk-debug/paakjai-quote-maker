<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>พักใจ Quote Maker</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#111;
      color:white;
      display:flex;
      justify-content:center;
      min-height:100vh;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#222;
      border-radius:25px;
      overflow:hidden;
    }

    #quoteCard{
      height:520px;
      background-image:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      position:relative;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.45);
      display:flex;
      flex-direction:column;
      justify-content:end;
      padding:25px;
    }

    #quoteText{
      font-size:28px;
      line-height:1.5;
      font-weight:bold;
    }

    .credit{
      margin-top:15px;
      color:#ffc0cb;
    }

    .content{
      padding:20px;
    }

    textarea, input{
      width:100%;
      box-sizing:border-box;
      margin:10px 0;
      padding:14px;
      border-radius:15px;
      border:none;
      background:#333;
      color:white;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:15px;
      background:#ff4f87;
      color:white;
      font-size:16px;
      margin-top:10px;
      cursor:pointer;
    }

    .gray{
      background:#555;
    }

    h1{
      text-align:center;
    }
  </style>
</head>

<body>

<div class="card">

  <div id="quoteCard">
    <div class="overlay">
      <div id="quoteText">บางความรู้สึก... ก็พูดได้แค่ในเพลง</div>
      <div class="credit">#สถานีเพลงเพราะ</div>
    </div>
  </div>

  <div class="content">
    <h1>พักใจ Quote Maker</h1>

    <textarea id="inputQuote" placeholder="พิมพ์คำคมของคุณ..."></textarea>

    <button onclick="changeQuote()">เปลี่ยนคำคม</button>

    <input type="file" id="imageUpload" accept="image/*" onchange="changeImage(event)">

    <button class="gray" onclick="downloadImage()">ดาวน์โหลดภาพ</button>
  </div>

</div>

<script>
function changeQuote(){
  const input = document.getElementById("inputQuote").value;
  if(input.trim() !== ""){
    document.getElementById("quoteText").innerText = input;
  }
}

function changeImage(event){
  const file = event.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      document.getElementById("quoteCard").style.backgroundImage = `url('${e.target.result}')`;
    }
    reader.readAsDataURL(file);
  }
}

function downloadImage(){
  const card = document.getElementById("quoteCard");

  html2canvas(card).then(canvas => {
    const link = document.createElement("a");
    link.download = "paakjai-quote.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}
</script>

</body>
</html>
